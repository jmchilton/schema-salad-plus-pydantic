saladVersion: v1.1
$base: "https://example.org/test#"

$namespaces:
  test: "https://example.org/test#"
  pydantic: "https://example.org/pydantic#"

$graph:

- name: BaseRecord
  type: record
  abstract: true
  doc: |
    A base record with common fields.
  fields:
    - name: id
      type: string?
      jsonldPredicate: "@id"
      doc: Unique identifier.
    - name: name
      type: string?
      jsonldPredicate: "@id"
      doc: Display name.

- name: StatusEnum
  type: enum
  symbols:
    - active
    - inactive
    - pending
  doc: Status values for items.

- name: ItemKindSingle
  type: enum
  symbols:
    - widget
  doc: Single-value discriminator for widgets.

- name: ChildRecord
  type: record
  extends: BaseRecord
  documentRoot: true
  doc: |
    A concrete child record extending BaseRecord.
  fields:
    - name: status
      type: StatusEnum?
      doc: Current status.
    - name: format-version
      type: string?
      jsonldPredicate:
        _id: "test:format_version"
      pydantic:alias: "format-version"
      doc: Version string with hyphenated JSON key.
    - name: items
      type: Any?
      jsonldPredicate:
        _id: "test:ChildRecord/items"
        noLinkCheck: true
      pydantic:type: "dict[str, str]"
      doc: A dict of string items.
    - name: tags
      type:
        - "null"
        - type: array
          items: string
      doc: List of tags.
    - name: members
      type:
        - "null"
        - type: array
          items:
            - PersonMember
            - OrgMember
      jsonldPredicate:
        _id: "test:ChildRecord/members"
        noLinkCheck: true
      pydantic:discriminator_field: "class"
      pydantic:discriminator_map: '{"Person": "PersonMember", "Organization": "OrgMember"}'
      doc: List of members with discriminated union on class field.

- name: PersonType
  type: enum
  symbols:
    - Person
  doc: Discriminator for Person.

- name: OrgType
  type: enum
  symbols:
    - Organization
  doc: Discriminator for Organization.

- name: BaseMember
  type: record
  abstract: true
  doc: Base member fields.
  fields:
    - name: name
      type: string?
      jsonldPredicate: "@id"
      doc: Member name.

- name: PersonMember
  type: record
  extends: BaseMember
  doc: A person member.
  fields:
    - name: class
      type: PersonType
      jsonldPredicate:
        "_id": "@type"
        "_type": "@vocab"
      doc: Type discriminator.
    - name: email
      type: string?
      doc: Email address.

- name: OrgMember
  type: record
  extends: BaseMember
  doc: An organization member.
  fields:
    - name: class
      type: OrgType
      jsonldPredicate:
        "_id": "@type"
        "_type": "@vocab"
      doc: Type discriminator.
    - name: url
      type: string?
      jsonldPredicate:
        _id: "test:url"
      doc: Website URL.

- name: Member
  type: union
  names:
    - PersonMember
    - OrgMember
  doc: A member, either person or org.

- name: ShapeType
  type: enum
  symbols:
    - circle
  doc: Single-symbol shape discriminator for circles.

- name: BoxType
  type: enum
  symbols:
    - box
    - rectangle
  doc: Multi-symbol shape discriminator for boxes.

- name: Circle
  type: record
  doc: A circle shape.
  fields:
    - name: kind
      type: ShapeType
      jsonldPredicate:
        "_id": "@type"
        "_type": "@vocab"
      doc: Shape discriminator.
    - name: radius
      type: float
      doc: Circle radius.

- name: Box
  type: record
  doc: A box or rectangle shape.
  fields:
    - name: kind
      type: BoxType
      jsonldPredicate:
        "_id": "@type"
        "_type": "@vocab"
      doc: Shape discriminator.
    - name: width
      type: float
      doc: Box width.

- name: Canvas
  type: record
  doc: A canvas with shapes.
  fields:
    - name: shapes
      type: Any?
      jsonldPredicate:
        _id: "test:Canvas/shapes"
        noLinkCheck: true
      pydantic:type: "list[Circle | Box] | dict[str, Circle | Box] | None"
      pydantic:discriminator_field: "kind"
      pydantic:discriminator_map: '{"circle": "Circle", "box": "Box", "rectangle": "Box"}'
      pydantic:discriminator_default: "Box"
      doc: Shapes on the canvas.

- name: MultiLiteralRecord
  type: record
  doc: Record to test multi-value Literal default.
  fields:
    - name: type
      type: string
      jsonldPredicate:
        "_id": "@type"
        "_type": "@vocab"
      pydantic:type: 'Literal["integer", "int"]'
      doc: Multi-value literal type field.
